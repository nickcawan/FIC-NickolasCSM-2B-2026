<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <div class="particulas"></div>

    <nav class="navegacao">
        <ul class="menu">
            <li><a href="home.html" class="menu-link">Home</a></li>
            <li><a href="sobre.html" class="menu-link">Sobre</a></li>
            <li><a href="projetos.html" class="menu-link">Projetos</a></li>
            <li><a href="contatos.html" class="menu-link">Contatos</a></li>
        </ul>
    </nav>

    <section class="contato">
        <h2 class="contato-titulo">Entre em Contato</h2>
        <form class="formulario-contato" onsubmit="enviarWhats(event)">
            <div class="grupo-form">
                <input placeholder="Nome" class="campo-form" id="nome">
            </div>
            <div class="grupo-form">
                <textarea class="campo-form" placeholder="Digite sua Mensagem" id="mensagem" rows="4"></textarea>
            </div>

            <button type="submit" class="botao-form">Enviar Whatsapp</button>

        </form>
    </section>

    <script>
        function enviarWhats(event) {
            event.preventDefault()

            const nome = document.getElementById('nome').value;
            const mensagem = document.getElementById('mensagem').value;
            const telefone = '5584999223671'

            const texto = `Olá, meu nome é ${nome}, ${mensagem}`
            const msgFormada = encodeURIComponent(texto)

            const url = `https://wa.me/${telefone}?text=${msgFormada}`

            window.open(url, '_blank')
        }
    </script>

</body>

</html>
